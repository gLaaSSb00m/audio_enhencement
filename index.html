<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CrystalClear AI Audio Enhancer (Vanilla)</title>
  <link rel="stylesheet" href="/index.css">
  <style>
    /* Minimal layout helpers; keep most styles in index.css */
    .container { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px; }
    .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .col { display: flex; flex-direction: column; gap: 8px; }
    .btn { background: #2563eb; color: white; border: none; border-radius: 8px; padding: 10px 14px; font-weight: 600; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn.secondary { background: #0ea5e9; }
    .btn.neutral { background: #334155; }
    .muted { color: #94a3b8; }
    input[type="file"] { padding: 10px; border: 1px solid #334155; border-radius: 8px; background: #0b1224; color: #e5e7eb; }
    progress { width: 100%; height: 10px; }
    canvas { width: 100%; height: 120px; background: #0a0f1e; border-radius: 8px; border: 1px solid #1f2937; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
    @media (min-width: 900px) { .grid { grid-template-columns: 1fr 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <header class="col" style="gap: 4px; margin-bottom: 16px;">
      <h1 style="margin: 0;">CrystalClear AI Audio Enhancer</h1>
      <p class="muted" style="margin: 0;">Vanilla HTML/CSS/JS build. Enhance audio via your local API.</p>
    </header>

    <section class="grid">
      <!-- Left: Controls and Player -->
      <div class="card col">
        <h2 style="margin: 0 0 8px 0;">Input Audio</h2>
        <div class="row">
          <input id="fileInput" type="file" accept="audio/*" />
          <button id="playBtn" class="btn neutral" disabled>Play</button>
          <button id="pauseBtn" class="btn neutral" disabled>Pause</button>
        </div>
        <div class="row">
          <button id="recordBtn" class="btn">Record</button>
          <button id="stopRecordBtn" class="btn secondary" disabled>Stop</button>
          <span id="recordStatus" class="muted">Mic idle</span>
        </div>
        <audio id="audio" controls style="width: 100%; margin-top: 8px;"></audio>
        <canvas id="visualizer" height="120"></canvas>
        <div class="muted" id="fileMeta"></div>
      </div>

      <!-- Right: Enhance and Output -->
      <div class="card col">
        <h2 style="margin: 0 0 8px 0;">Enhancement</h2>
        <div class="row">
        <button id="enhanceBtn" class="btn" disabled>Enhance</button>
        <button id="stopEnhanceBtn" class="btn secondary" disabled>Cancel</button>
        <span id="status" class="muted">Idle</span>
        </div>
        <div class="col" style="gap: 6px;">
        <progress id="progress" value="0" max="1" style="width: 100%; display: none;"></progress>
        <div id="processingBar" class="processing-bar" style="display:none;">
          <div id="processingInner" class="processing-bar-inner"></div>
        </div>
        </div>
        <!-- API URL is now hardcoded in index.js to avoid exposing it in the UI. -->

        <div id="result" class="col" style="margin-top: 8px;">
          <div id="downloadRow" class="row" style="display:none;">
            <a id="downloadLink" class="btn" download="enhanced.wav">Download Enhanced</a>
            <button id="playEnhancedBtn" class="btn neutral">Play Enhanced</button>
          </div>
          <audio id="enhancedAudio" controls style="width: 100%; display:none;"></audio>
        </div>
      </div>
    </section>
  </div>

  <script src="/index.js" defer></script>
</body>
</html>
